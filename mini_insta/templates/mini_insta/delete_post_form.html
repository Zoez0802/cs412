<!-- mini_insta/templates/mini_insta/delete_post_form.html -->
<!--
Author: Minjie Zuo (minjiez@bu.edu), 2/24/2026
Render a confirmation form for deleting a Post. This form is rendered when the user clicks the "Delete Post" button on the show_post page. It asks the user to confirm that they want to delete the post, and if they confirm, it submits a POST request to actually delete the post.
!-->

{% extends "mini_insta/base.html" %}

{% block content %}

<div class="form-card">
  <div class="form-title">Delete Post</div>

  <p>Are you sure you want to delete this post?</p>

  {% if post.caption %}
    <p><strong>Caption:</strong> {{ post.caption }}</p>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
   </form>

    <!-- Cancel Form -->
    <form method="GET" action="{% url 'show_profile' profile.pk %}">
    <button type="submit">Cancel</button>
    </form>


</div>

{% endblock %}
