<!-- mini_insta/templates/mini_insta/logged_out.html -->
 <!--
Author: Minjie Zuo (minjiez@bu.edu)
This template renders the logged out message. It extends the base template and displays a simple message indicating that the user has been logged out, along with a link to log back in.
-->

{% extends "mini_insta/base.html" %}

{% block content %}
  <h2>You have been logged out.</h2>
  <p><a href="{% url 'login' %}">Log in again</a></p>
{% endblock %}
